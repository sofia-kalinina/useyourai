name: Build and Test UI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install dependencies
        run: cd ui && npm install
      - name: Build project
        run: cd ui && npm run build
