name: Test Lambdas

on:
  pull_request:
    paths:
      - 'lambdas/**'
      - 'tests/**'
      - 'template.yaml'
      - 'requirements*.txt'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Lambda tests
        run: pytest tests/ -v
