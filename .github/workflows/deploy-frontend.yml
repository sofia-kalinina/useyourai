name: Deploy Frontend

on:
  push:
    branches:
      - main
      - feature/pass-api-gateway-to-frontend
  workflow_dispatch:  # Allow manual triggers

env:
  AWS_REGION: eu-central-1
  TFC_WORKSPACE: ws-FRPCL1cuSBwuiLzS

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.fetch_outputs.outputs.api_url }}
      s3_bucket: ${{ steps.fetch_outputs.outputs.s3_bucket }}
      cloudfront_id: ${{ steps.fetch_outputs.outputs.cloudfront_id }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Terraform Cloud outputs
        id: fetch_outputs
        run: |
            STATE_VERSION_ID=$(curl -s \
                --header "Authorization: Bearer ${{ secrets.TFC_TOKEN }}" \
                --header "Content-Type: application/vnd.api+json" \
                "https://app.terraform.io/api/v2/workspaces/${{ env.TFC_WORKSPACE }}/current-state-version" | jq -r '.data.id'
            )

            BASE_URL="https://app.terraform.io/api/v2/state-versions/${STATE_VERSION_ID}/outputs?page%5Bnumber%5D=1\u0026page%5Bsize%5D=20"

            all_data=()
            next_url="$BASE_URL"

            while [ -n "$next_url" ]; do
                response=$(curl -s \
                    --header "Authorization: Bearer ${{ secrets.TFC_TOKEN }}" \
                    --header "Content-Type: application/vnd.api+json" \
                    "$next_url")
                
                # Read each JSON object into array as separate elements
                while IFS= read -r line; do
                    all_data+=("$line")
                done < <(echo "$response" | jq -c '.data[]')
                
                next_url=$(echo "$response" | jq -r '.links.next // empty')
            done

            # Extract variables from the collected data
            API_GATEWAY_URL=""
            CDN_URL=""
            UI_BUCKET_NAME=""

            for item in "${all_data[@]}"; do
                if [ -n "$item" ]; then

                    name=$(echo "$item" | jq -r '.attributes.name')
                    value=$(echo "$item" | jq -r '.attributes.value')

                    case $name in
                        "api_gateway_url")
                            API_GATEWAY_URL="$value"
                            ;;
                        "cdn_url")
                            CDN_URL="$value"
                            ;;
                        "ui_bucket_name")
                            UI_BUCKET_NAME="$value"
                            ;;
                    esac
                fi
            done

            echo "API_GATEWAY_URL: $API_GATEWAY_URL"
            echo "CDN_URL: $CDN_URL"
            echo "UI_BUCKET_NAME: $UI_BUCKET_NAME"
          
            # Set outputs for next job
            echo "api_gateway_url=$API_GATEWAY_URL" >> $GITHUB_OUTPUT
            echo "cdn_url=$CDN_URL" >> $GITHUB_OUTPUT
            echo "ui_bucket_name=$UI_BUCKET_NAME" >> $GITHUB_OUTPUT


      - name: Generate config.js
        run: |
          cat > ui/public/config.js <<EOF
          window.ENV = {
            API_URL: '${{ steps.fetch_outputs.outputs.api_gateway_url }}'
          };
          EOF
          cat ui/public/config.js

